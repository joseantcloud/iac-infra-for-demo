trigger: none
pr: none

parameters:
  - name: serviceConnection
    displayName: Azure Service Connection
    type: string
    default: 'your-service-connection-name'

  - name: resourceGroupName
    displayName: Resource Group Name
    type: string
    default: 'your-resource-group-name'

  - name: location
    displayName: Azure Region
    type: string
    default: 'eastus'
    values:
      - eastus
      - eastus2
      - westus2
      - centralus
      - brazilsouth
      - canadacentral

  - name: environment
    displayName: Environment
    type: string
    default: 'dev'
    values:
      - dev
      - qa
      - prod

  - name: owner
    displayName: Owner
    type: string
    default: 'your-name'

pool:
  name: Default

variables:
  terraformWorkingDirectory: '$(System.DefaultWorkingDirectory)/stacks/rg'

stages:
  - stage: Terraform_Deploy_RG
    displayName: Deploy Resource Group with Terraform
    jobs:
      - job: DeployRG
        displayName: Terraform Apply - Resource Group
        steps:
          - checkout: self

          - powershell: |
              $ErrorActionPreference = "Stop"

              Write-Host "Agent Machine Name: $env:COMPUTERNAME"
              Write-Host "Default Working Directory: $(System.DefaultWorkingDirectory)"
              Write-Host "Terraform Working Directory: $(terraformWorkingDirectory)"

              if (-not (Test-Path "$(terraformWorkingDirectory)")) {
                Write-Error "Terraform working directory does not exist: $(terraformWorkingDirectory)"
              }

              Write-Host "Checking installed tools..."
              terraform version
              az version
            displayName: Pre-checks

          - task: AzureCLI@2
            displayName: Terraform Init / Validate / Plan / Apply
            inputs:
              azureSubscription: ${{ parameters.serviceConnection }}
              scriptType: ps
              scriptLocation: inlineScript
              addSpnToEnvironment: true
              workingDirectory: $(terraformWorkingDirectory)
              inlineScript: |
                $ErrorActionPreference = "Stop"

                Write-Host "Setting Azure authentication variables..."

                $env:ARM_CLIENT_ID = $env:servicePrincipalId
                $env:ARM_CLIENT_SECRET = $env:servicePrincipalKey
                $env:ARM_SUBSCRIPTION_ID = (az account show --query id -o tsv).Trim()
                $env:ARM_TENANT_ID = $env:tenantId

                Write-Host "Exporting Terraform variables..."

                $env:TF_VAR_subscription_id = $env:ARM_SUBSCRIPTION_ID
                $env:TF_VAR_resource_group_name = "${{ parameters.resourceGroupName }}"
                $env:TF_VAR_location = "${{ parameters.location }}"
                $env:TF_VAR_environment = "${{ parameters.environment }}"
                $env:TF_VAR_owner = "${{ parameters.owner }}"

                Write-Host "Execution context:"
                Write-Host "  Subscription: $env:ARM_SUBSCRIPTION_ID"
                Write-Host "  Working Directory: $(Get-Location)"
                Write-Host "  Resource Group: $env:TF_VAR_resource_group_name"
                Write-Host "  Location: $env:TF_VAR_location"
                Write-Host "  Environment: $env:TF_VAR_environment"
                Write-Host "  Owner: $env:TF_VAR_owner"

                Write-Host "Initializing Terraform..."
                terraform init

                Write-Host "Validating Terraform configuration..."
                terraform validate

                Write-Host "Planning infrastructure..."
                terraform plan -out=tfplan

                Write-Host "Applying infrastructure..."
                terraform apply -auto-approve tfplan

                Write-Host "Terraform outputs:"
                terraform output