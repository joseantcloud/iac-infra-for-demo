trigger: none
pr: none

parameters:
  - name: serviceConnection
    displayName: Azure Service Connection
    type: string
    default: 'azure-preparations'

  - name: targetStack
    displayName: Target Stack
    type: string
    default: 'rg'
    values:
      - rg
      - aks
      - webapp
      - storage

  - name: useExistingResourceGroup
    displayName: Use Existing Resource Group
    type: boolean
    default: false

  - name: resourceGroupName
    displayName: Resource Group Name
    type: string
    default: 'rg-demo-dev'

  - name: location
    displayName: Azure Region
    type: string
    default: 'eastus'
    values:
      - eastus
      - eastus2
      - westus2
      - centralus
      - brazilsouth
      - canadacentral

  - name: environment
    displayName: Environment
    type: string
    default: 'dev'
    values:
      - dev
      - qa
      - stg
      - prod

  - name: owner
    displayName: Owner
    type: string
    default: 'antonio'

  - name: aksName
    displayName: AKS Name
    type: string
    default: 'aks-demo-dev'

  - name: dnsPrefix
    displayName: AKS DNS Prefix
    type: string
    default: 'aksdemodev'

  - name: vnetName
    displayName: VNet Name
    type: string
    default: 'vnet-demo-dev'

  - name: appServicePlanName
    displayName: App Service Plan Name
    type: string
    default: 'asp-demo-dev'

  - name: webAppName
    displayName: Web App Name
    type: string
    default: 'webapp-demo-dev'

  - name: storageAccountName
    displayName: Storage Account Name
    type: string
    default: 'stdemodev001'

  - name: storageAccountTier
    displayName: Storage Account Tier
    type: string
    default: 'Standard'
    values:
      - Standard
      - Premium

  - name: storageReplicationType
    displayName: Storage Replication Type
    type: string
    default: 'LRS'
    values:
      - LRS
      - GRS
      - RAGRS
      - ZRS
      - GZRS
      - RAGZRS

  - name: storageContainerName
    displayName: Storage Container Name
    type: string
    default: 'appdata'

pool:
  name: Default

variables:
  terraformWorkingDirectory: '$(System.DefaultWorkingDirectory)/stacks/${{ parameters.targetStack }}'

stages:
  - stage: Terraform_Deploy
    displayName: Deploy Terraform Stack
    jobs:
      - job: Deploy
        displayName: Terraform Apply
        steps:
          - checkout: self

          - powershell: |
              $ErrorActionPreference = "Stop"

              Write-Host "Agent Machine Name: $env:COMPUTERNAME"
              Write-Host "Default Working Directory: $(System.DefaultWorkingDirectory)"
              Write-Host "Terraform Working Directory: $(terraformWorkingDirectory)"

              if (-not (Test-Path "$(terraformWorkingDirectory)")) {
                Write-Error "Terraform working directory does not exist: $(terraformWorkingDirectory)"
              }

              Write-Host "Checking installed tools..."
              terraform version
              az version
            displayName: Pre-checks

          - task: AzureCLI@2
            displayName: Terraform Init / Validate / Plan / Apply
            inputs:
              azureSubscription: ${{ parameters.serviceConnection }}
              scriptType: ps
              scriptLocation: inlineScript
              addSpnToEnvironment: true
              workingDirectory: $(terraformWorkingDirectory)
              inlineScript: |
                $ErrorActionPreference = "Stop"

                Write-Host "Setting Azure authentication variables..."

                $env:ARM_CLIENT_ID = $env:servicePrincipalId
                $env:ARM_CLIENT_SECRET = $env:servicePrincipalKey
                $env:ARM_SUBSCRIPTION_ID = (az account show --query id -o tsv).Trim()
                $env:ARM_TENANT_ID = $env:tenantId

                Write-Host "Exporting Terraform variables..."

                $env:TF_VAR_subscription_id = $env:ARM_SUBSCRIPTION_ID
                $env:TF_VAR_use_existing_resource_group = "${{ lower(parameters.useExistingResourceGroup) }}"
                $env:TF_VAR_resource_group_name = "${{ parameters.resourceGroupName }}"
                $env:TF_VAR_location = "${{ parameters.location }}"
                $env:TF_VAR_environment = "${{ parameters.environment }}"
                $env:TF_VAR_owner = "${{ parameters.owner }}"

                $env:TF_VAR_aks_name = "${{ parameters.aksName }}"
                $env:TF_VAR_dns_prefix = "${{ parameters.dnsPrefix }}"
                $env:TF_VAR_vnet_name = "${{ parameters.vnetName }}"

                $env:TF_VAR_app_service_plan_name = "${{ parameters.appServicePlanName }}"
                $env:TF_VAR_web_app_name = "${{ parameters.webAppName }}"

                $env:TF_VAR_storage_account_name = "${{ parameters.storageAccountName }}"
                $env:TF_VAR_account_tier = "${{ parameters.storageAccountTier }}"
                $env:TF_VAR_account_replication_type = "${{ parameters.storageReplicationType }}"
                $env:TF_VAR_container_name = "${{ parameters.storageContainerName }}"

                Write-Host "Execution context:"
                Write-Host "  Subscription: $env:ARM_SUBSCRIPTION_ID"
                Write-Host "  Working Directory: $(Get-Location)"
                Write-Host "  Target Stack: ${{ parameters.targetStack }}"
                Write-Host "  Resource Group: $env:TF_VAR_resource_group_name"

                terraform init
                if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

                terraform validate
                if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

                terraform plan -out=tfplan
                if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

                terraform apply -auto-approve tfplan
                if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

                terraform output